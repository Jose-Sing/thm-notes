<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <!-- Permitimos el zoom manual para mejorar la lectura -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>THM Interactive Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --thm-red: #ef4444; --bg-dark: #0d1117; }
        body { background-color: var(--bg-dark); }
        
        /* Sidebar ajustable para móvil */
        .sidebar { 
            position: fixed; top: 0; left: -100%; height: 100%; 
            width: 280px; z-index: 50; transition: 0.3s;
            background: #161b22; box-shadow: 10px 0 15px rgba(0,0,0,0.5);
        }
        .sidebar.open { left: 0; }

        /* Capa oscura cuando el menú está abierto */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 40; }
        .overlay.active { display: block; }

        .markdown-body { padding: 1.5rem; background: transparent !important; color: #d1d5db !important; }
        pre { position: relative; padding: 1rem !important; }
        
        /* Botón de copiar mejorado para táctil */
        .copy-btn {
            position: absolute; top: 8px; right: 8px;
            background: #30363d; padding: 6px 12px; border-radius: 6px;
            font-size: 14px; color: #8b949e;
        }
    </style>
</head>
<body class="text-gray-300">

    <div id="overlay" class="overlay"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar flex flex-col border-r border-gray-800">
        <div class="p-6 flex justify-between items-center">
            <span class="text-red-500 font-bold text-xl"><i class="fas fa-shield-halved"></i> THM</span>
            <button id="close-menu" class="md:hidden text-2xl text-gray-500">&times;</button>
        </div>
        <div class="px-4 mb-4">
            <input type="text" id="search" placeholder="Buscar..." class="w-full bg-gray-800 border border-gray-700 rounded-md px-3 py-2">
        </div>
        <nav id="menu" class="flex-1 overflow-y-auto px-3 space-y-1 pb-20">
            <!-- Botones aquí -->
        </nav>
    </aside>

    <!-- Contenido -->
    <main class="flex flex-col min-h-screen bg-[#0d1117]">
        <header class="h-16 border-b border-gray-800 flex items-center px-4 bg-[#161b22] sticky top-0 z-30">
            <button id="open-menu" class="p-2 text-white bg-gray-800 rounded-md mr-4">
                <i class="fas fa-bars"></i> Menú
            </button>
            <div id="breadcrumb" class="text-xs font-mono text-gray-500 truncate">/ home / thm-101</div>
            <div id="reading-progress" class="h-1 bg-red-500 absolute bottom-0 left-0 transition-all" style="width: 0%"></div>
        </header>

        <div id="scroll-container" class="flex-1 overflow-y-auto">
            <article id="content" class="markdown-body mx-auto max-w-4xl">
                <div class="text-center py-20 text-gray-600">
                    <i class="fas fa-hand-pointer text-5xl mb-4"></i>
                    <p>Toca el botón "Menú" para elegir un tema.</p>
                </div>
            </article>
        </div>
    </main>

    <script>
        const modules = [
            { name: "API REST Notes", path: "THM-101/API REST notes.md" },
            { name: "Blue Lab", path: "THM-101/Blue-lab.md" },
            { name: "Burp Suite", path: "THM-101/Burp_Suite_Study_Summary.md" },
            { name: "CAPA Analysis", path: "THM-101/CAPA_Study_Summary.md" },
            { name: "CyberChef", path: "THM-101/CyberChef_Study_Summary.md" },
            { name: "Firewall Fundamentals", path: "THM-101/Firewall_Fundamentals_Study_Summary.md" },
            { name: "FlareVM", path: "THM-101/FlareVM_Study_Summary.md" },
            { name: "Forensics Fundamentals", path: "THM-101/Forensics_Fundamentals_Study_Summary.md" },
            { name: "Gobuster", path: "THM-101/Gobuster_Study_Summary.md" },
            { name: "Hashing Basics", path: "THM-101/Hashing Basics.md" },
            { name: "Hydra", path: "THM-101/Hydra_Study_Summary.md" },
            { name: "IDS Fundamentals", path: "THM-101/IDS_Fundamentals_Study_Summary.md" },
            { name: "Incident Response", path: "THM-101/Incident_Response_Fundamentals_Study_Summary.md" },
            { name: "JS Essentials", path: "THM-101/JS_Essentials_Study_Summary.md" },
            { name: "Logs Fundamentals", path: "THM-101/Logs_Fundamentals_Study_Summary.md" },
            { name: "MITRE ATT&CK", path: "THM-101/MITRE_ATT&CK_Study_Summary.md" },
            { name: "Metasploit", path: "THM-101/Metasploit.md" },
            { name: "Moniker Link", path: "THM-101/Moniker link.md" },
            { name: "OWASP Design Flaws", path: "THM-101/OWASP_Application_Design_Flaws_Summary.md" },
            { name: "OWASP IAAA Failures", path: "THM-101/OWASP_IAAA_Failures_Summary.md" },
            { name: "OWASP Insecure Data", path: "THM-101/OWASP_Insecure_Data_Handling.md" },
            { name: "REMnux", path: "THM-101/REMnux_Study_Summary.md" },
            { name: "SIEM Summary", path: "THM-101/SIEM_Study_Summary.md" },
            { name: "SOC Basics", path: "THM-101/SOC_Basics_Study_Summary.md" },
            { name: "SQLMap", path: "THM-101/SQLMap_Study_Summary.md" },
            { name: "SQL Fundamentals", path: "THM-101/SQL_Fundamentals_Study_Summary.md" },
            { name: "Search Skills", path: "THM-101/Search_Skills_Study_Summary.md" },
            { name: "Security Principles", path: "THM-101/Security_Principles_Study_Summary.md" },
            { name: "Shell Overview", path: "THM-101/Shell_Overview_Study_Summary.md" },
            { name: "Vulnerability Scanner", path: "THM-101/Vulnerability_Scanner_Overview_Study_Summary.md" },
            { name: "Web App Basics", path: "THM-101/Web_Application_Basics.md" },
            { name: "Dirb Attack URLs", path: "THM-101/dirb-atackURLS.md" },
            { name: "John the Ripper", path: "THM-101/john the Ripper.md" },
            { name: "Netcat vs Nmap", path: "THM-101/netcat_vs_nmap.md" }
        ];

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('overlay');
        const menu = document.getElementById('menu');
        const content = document.getElementById('content');
        const scrollContainer = document.getElementById('scroll-container');

        // Controles del Menú
        const toggleMenu = () => {
            sidebar.classList.toggle('open');
            overlay.classList.toggle('active');
        };

        document.getElementById('open-menu').onclick = toggleMenu;
        document.getElementById('close-menu').onclick = toggleMenu;
        overlay.onclick = toggleMenu;

        function renderMenu(filter = "") {
            menu.innerHTML = "";
            modules.filter(m => m.name.toLowerCase().includes(filter.toLowerCase())).forEach(mod => {
                const b = document.createElement('button');
                b.className = "w-full text-left px-4 py-3 rounded-md text-sm bg-gray-800/30 hover:bg-gray-700 transition flex items-center gap-2";
                b.innerHTML = `<i class="far fa-file-alt text-red-500"></i> ${mod.name}`;
                b.onclick = () => {
                    loadMarkdown(mod.path);
                    if(window.innerWidth < 1024) toggleMenu();
                };
                menu.appendChild(b);
            });
        }

        async function loadMarkdown(path) {
            content.innerHTML = "<p class='animate-pulse'>Cargando...</p>";
            try {
                const res = await fetch(path);
                const text = await res.text();
                content.innerHTML = marked.parse(text);
                
                // Botones de copiar para móvil
                content.querySelectorAll('pre').forEach(pre => {
                    const btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.innerHTML = 'Copy';
                    btn.onclick = () => {
                        navigator.clipboard.writeText(pre.innerText);
                        btn.innerText = '¡Listo!';
                        setTimeout(() => btn.innerText = 'Copy', 2000);
                    };
                    pre.appendChild(btn);
                });
                scrollContainer.scrollTo(0,0);
            } catch (e) { content.innerHTML = "Error al cargar."; }
        }

        document.getElementById('search').oninput = (e) => renderMenu(e.target.value);
        
        scrollContainer.onscroll = () => {
            const winScroll = scrollContainer.scrollTop;
            const height = scrollContainer.scrollHeight - scrollContainer.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("reading-progress").style.width = scrolled + "%";
        };

        renderMenu();
    </script>
</body>
</html>
