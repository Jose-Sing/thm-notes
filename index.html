<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>THM Study Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-theme"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg: #0d1117; --bg2: #161b22; --bg3: #21262d; --bg4: #30363d;
  --border: #30363d; --text: #e6edf3; --text2: #8b949e; --text3: #6e7681;
  --accent: #58a6ff; --green: #3fb950; --orange: #ffa657;
  --sidebar-w: 280px; --header-h: 56px; --radius: 8px;
}
[data-theme="light"] {
  --bg: #ffffff; --bg2: #f6f8fa; --bg3: #eaeef2; --border: #d0d7de; --text: #1f2328;
}
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; }
#header { position: fixed; top: 0; width: 100%; height: var(--header-h); background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 100; }
#sidebar { position: fixed; top: var(--header-h); left: 0; bottom: 0; width: var(--sidebar-w); background: var(--bg2); border-right: 1px solid var(--border); overflow-y: auto; padding: 15px 10px; }
#main { margin-left: var(--sidebar-w); margin-top: var(--header-h); padding: 40px; max-width: 900px; }
.module-btn { width: 100%; text-align: left; background: none; border: none; color: var(--text2); padding: 10px; cursor: pointer; border-radius: var(--radius); font-size: 14px; margin-bottom: 4px; }
.module-btn:hover { background: var(--bg3); color: var(--text); }
.module-btn.active { background: rgba(88,166,255,0.1); color: var(--accent); font-weight: 600; }
.md-body { line-height: 1.6; }
pre { background: #161b22; padding: 16px; border-radius: 8px; overflow: auto; border: 1px solid var(--border); }
code { font-family: 'JetBrains Mono', monospace; }
.loading { color: var(--text3); font-style: italic; }
.error-msg { color: #f85149; background: rgba(248,81,73,0.1); padding: 20px; border-radius: 8px; border: 1px solid rgba(248,81,73,0.2); }
</style>
</head>
<body>

<header id="header">
  <div style="font-family:'Syne',sans-serif; font-weight:800; color:var(--accent)">THM<span style="color:var(--text2)">.notes</span></div>
</header>

<nav id="sidebar" id="module-list">
  <div style="font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; margin-bottom: 10px; padding-left: 10px;">Módulos THM-101</div>
  <div id="buttons-container"></div>
</nav>

<main id="main">
  <div id="content-area">
    <h1 style="font-family:'Syne'">Bienvenido, Jose Pablo</h1>
    <p style="color:var(--text2)">Selecciona un módulo en la izquierda para cargar tus notas de estudio.</p>
  </div>
</main>

<script>
const modules = [
    { name: "API REST Notes", path: "THM-101/API REST notes.md" },
    { name: "Blue Lab", path: "THM-101/Blue-lab.md" },
    { name: "Burp Suite", path: "THM-101/Burp_Suite_Study_Summary.md" },
    { name: "CAPA Analysis", path: "THM-101/CAPA_Study_Summary.md" },
    { name: "CyberChef", path: "THM-101/CyberChef_Study_Summary.md" },
    { name: "Firewall Fundamentals", path: "THM-101/Firewall_Fundamentals_Study_Summary.md" },
    { name: "FlareVM", path: "THM-101/FlareVM_Study_Summary.md" },
    { name: "Forensics Fundamentals", path: "THM-101/Forensics_Fundamentals_Study_Summary.md" },
    { name: "Gobuster", path: "THM-101/Gobuster_Study_Summary.md" },
    { name: "Hashing Basics", path: "THM-101/Hashing Basics.md" },
    { name: "Hydra", path: "THM-101/Hydra_Study_Summary.md" },
    { name: "IDS Fundamentals", path: "THM-101/IDS_Fundamentals_Study_Summary.md" },
    { name: "Incident Response", path: "THM-101/Incident_Response_Fundamentals_Study_Summary.md" },
    { name: "JS Essentials", path: "THM-101/JS_Essentials_Study_Summary.md" },
    { name: "Logs Fundamentals", path: "THM-101/Logs_Fundamentals_Study_Summary.md" },
    { name: "MITRE ATT&CK", path: "THM-101/MITRE_ATT&CK_Study_Summary.md" },
    { name: "Metasploit", path: "THM-101/Metasploit.md" },
    { name: "Moniker Link", path: "THM-101/Moniker link.md" },
    { name: "OWASP Design Flaws", path: "THM-101/OWASP_Application_Design_Flaws_Summary.md" },
    { name: "OWASP IAAA Failures", path: "THM-101/OWASP_IAAA_Failures_Summary.md" },
    { name: "OWASP Insecure Data", path: "THM-101/OWASP_Insecure_Data_Handling.md" },
    { name: "REMnux", path: "THM-101/REMnux_Study_Summary.md" },
    { name: "SIEM Summary", path: "THM-101/SIEM_Study_Summary.md" },
    { name: "SOC Basics", path: "THM-101/SOC_Basics_Study_Summary.md" },
    { name: "SQLMap", path: "THM-101/SQLMap_Study_Summary.md" },
    { name: "SQL Fundamentals", path: "THM-101/SQL_Fundamentals_Study_Summary.md" },
    { name: "Search Skills", path: "THM-101/Search_Skills_Study_Summary.md" },
    { name: "Security Principles", path: "THM-101/Security_Principles_Study_Summary.md" },
    { name: "Shell Overview", path: "THM-101/Shell_Overview_Study_Summary.md" },
    { name: "Vulnerability Scanner", path: "THM-101/Vulnerability_Scanner_Overview_Study_Summary.md" },
    { name: "Web App Basics", path: "THM-101/Web_Application_Basics.md" },
    { name: "Dirb Attack URLs", path: "THM-101/dirb-atackURLS.md" },
    { name: "John the Ripper", path: "THM-101/john the Ripper.md" },
    { name: "Netcat vs Nmap", path: "THM-101/netcat_vs_nmap.md" }
];

function init() {
    const container = document.getElementById('buttons-container');
    modules.forEach((mod, index) => {
        const btn = document.createElement('button');
        btn.className = 'module-btn';
        btn.textContent = mod.name;
        btn.onclick = () => loadMarkdown(mod.path, btn);
        container.appendChild(btn);
    });
}

async function loadMarkdown(path, btn) {
    const contentArea = document.getElementById('content-area');
    
    // UI Feedback
    document.querySelectorAll('.module-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    contentArea.innerHTML = '<p class="loading">Cargando archivo markdown...</p>';

    try {
        const response = await fetch(path);
        if (!response.ok) throw new Error('No se pudo encontrar el archivo .md');
        const text = await response.text();
        
        contentArea.innerHTML = `<div class="md-body">${marked.parse(text)}</div>`;
        hljs.highlightAll();
        window.scrollTo({top: 0, behavior: 'smooth'});
    } catch (err) {
        contentArea.innerHTML = `
            <div class="error-msg">
                <h3>Error al cargar el módulo</h3>
                <p>Asegúrate de que la carpeta <strong>THM-101</strong> esté en el mismo directorio que este HTML y que los nombres de archivo coincidan exactamente.</p>
                <small>${err.message}</small>
            </div>`;
    }
}

init();
</script>
</body>
</html>
