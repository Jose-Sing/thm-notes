<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THM Interactive Notes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.2.0/github-markdown-dark.min.css">
    <!-- Iconos y Fuentes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --thm-red: #ef4444; --bg-dark: #0d1117; }
        body { background-color: var(--bg-dark); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* Estilo del Dashboard */
        .sidebar { background: #161b22; width: 300px; transition: all 0.3s; }
        .sidebar-btn { border-left: 3px solid transparent; transition: 0.2s; }
        .sidebar-btn.active { background: #21262d; border-left-color: var(--thm-red); color: white; }

        /* Contenido Interactivo */
        .markdown-body { padding: 2rem; background: transparent !important; font-size: 1.1rem; }
        
        /* Botón de copiar código */
        .code-container { position: relative; }
        .copy-btn {
            position: absolute; top: 5px; right: 5px;
            background: #30363d; color: #8b949e;
            padding: 4px 8px; border-radius: 6px; font-size: 12px;
            cursor: pointer; opacity: 0; transition: 0.3s;
        }
        .code-container:hover .copy-btn { opacity: 1; }
        
        /* Tablas y Alertas */
        table { width: 100% !important; border-collapse: collapse; margin: 15px 0; }
        th { background: #21262d !important; }
        blockquote { border-left: 4px solid var(--thm-red) !important; background: #161b22; padding: 10px 20px; }
    </style>
</head>
<body class="flex h-screen overflow-hidden text-gray-300">

    <!-- Sidebar con buscador -->
    <aside class="sidebar flex flex-col border-r border-gray-800">
        <div class="p-6">
            <div class="flex items-center gap-2 text-red-500 font-bold text-xl mb-4">
                <i class="fas fa-shield-halved"></i> THM MASTER
            </div>
            <input type="text" id="search" placeholder="Buscar módulo..." 
                   class="w-full bg-gray-800 border border-gray-700 rounded-md px-3 py-2 text-sm focus:outline-none focus:ring-1 focus:ring-red-500">
        </div>
        <nav id="menu" class="flex-1 overflow-y-auto px-3 space-y-1 pb-10">
            <!-- Botones de módulos -->
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col overflow-hidden bg-[#0d1117]">
        <header class="h-14 border-b border-gray-800 flex items-center justify-between px-6 bg-[#161b22]">
            <div id="breadcrumb" class="text-sm text-gray-400 font-mono">/ root / home / summaries</div>
            <div id="reading-progress" class="h-1 bg-red-500 absolute bottom-0 left-0 transition-all duration-200" style="width: 0%"></div>
        </header>

        <div id="scroll-container" class="flex-1 overflow-y-auto">
            <!-- Aquí se inyecta el contenido -->
            <div id="content" class="markdown-body mx-auto max-w-5xl">
                <div class="flex flex-col items-center justify-center h-full text-gray-600">
                    <i class="fas fa-terminal text-6xl mb-4"></i>
                    <p class="text-xl">Selecciona una herramienta o laboratorio para iniciar el repaso.</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const modules = [
            { name: "API REST Notes", path: "THM-101/API REST notes.md" },
            { name: "CAPA Analysis", path: "THM-101/CAPA_Study_Summary.md" },
            { name: "Metasploit", path: "THM-101/Metasploit.md" },
            { name: "Netcat vs Nmap", path: "THM-101/netcat_vs_nmap.md" }
            // Agrega aquí el resto de tu lista que ya tienes...
        ];

        const menu = document.getElementById('menu');
        const content = document.getElementById('content');
        const scrollContainer = document.getElementById('scroll-container');

        // Renderizar Menú
        function renderMenu(filter = "") {
            menu.innerHTML = "";
            modules.filter(m => m.name.toLowerCase().includes(filter.toLowerCase())).forEach(mod => {
                const b = document.createElement('button');
                b.className = "sidebar-btn w-full text-left px-4 py-2 rounded-md text-sm hover:text-white flex items-center gap-3";
                b.innerHTML = `<i class="far fa-file-code opacity-40"></i> ${mod.name}`;
                b.onclick = () => {
                    document.querySelectorAll('.sidebar-btn').forEach(x => x.classList.remove('active'));
                    b.classList.add('active');
                    loadMarkdown(mod.path);
                };
                menu.appendChild(b);
            });
        }

        async function loadMarkdown(path) {
            content.innerHTML = "<div class='text-center mt-20'><i class='fas fa-circle-notch animate-spin text-3xl'></i></div>";
            try {
                const res = await fetch(path);
                const text = await res.text();
                
                // Convertir MD a HTML
                let htmlContent = marked.parse(text);
                content.innerHTML = htmlContent;

                // POST-PROCESAMIENTO INTERACTIVO
                // 1. Añadir botones de copiar a los bloques de código
                content.querySelectorAll('pre').forEach(pre => {
                    const container = document.createElement('div');
                    container.className = 'code-container';
                    pre.parentNode.insertBefore(container, pre);
                    container.appendChild(pre);
                    
                    const btn = document.createElement('button');
                    btn.className = 'copy-btn';
                    btn.innerHTML = '<i class="far fa-copy"></i> Copy';
                    btn.onclick = () => {
                        navigator.clipboard.writeText(pre.innerText);
                        btn.innerHTML = '<i class="fas fa-check"></i> Copied!';
                        setTimeout(() => btn.innerHTML = '<i class="far fa-copy"></i> Copy', 2000);
                    };
                    container.appendChild(btn);
                });

            } catch (e) {
                content.innerHTML = "Error cargando el archivo. Revisa el nombre en el repositorio.";
            }
        }

        // Buscador
        document.getElementById('search').oninput = (e) => renderMenu(e.target.value);

        // Barra de progreso
        scrollContainer.onscroll = () => {
            const winScroll = scrollContainer.scrollTop;
            const height = scrollContainer.scrollHeight - scrollContainer.clientHeight;
            const scrolled = (winScroll / height) * 100;
            document.getElementById("reading-progress").style.width = scrolled + "%";
        };

        renderMenu();
    </script>
</body>
</html>
